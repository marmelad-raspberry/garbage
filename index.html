<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Unlock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .icon {
            margin-right: 8px;
            font-size: 20px;
        }
        #success-screen {
            display: none;
        }
        .error {
            color: #ff5252;
            display: none;
            margin-top: 10px;
            font-size: 14px;
        }
        .result-number {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Input Screen -->
    <div class="container" id="input-screen">
        <h2>Unlock Level</h2>
        <input type="text" id="code-input" maxlength="4" placeholder="Enter 4-digit code">
        <button onclick="processCode()">
            <span class="icon">🛒</span> Buy code to complete the level
        </button>
        <div class="error" id="error-message">Invalid code</div>
    </div>

    <!-- Success Screen -->
    <div class="container" id="success-screen">
        <h2>Thank you for your purchase</h2>
        <p>Your algorithm calculation result is:</p>
        <div class="result-number" id="result-output"></div>
    </div>

    <script>
        function processCode() {
            const code = document.getElementById('code-input').value.toLowerCase();
            const errorMsg = document.getElementById('error-message');
            
            if (code.length !== 4) {
                errorMsg.style.display = 'block';
                return;
            }

            let result = 0;

            // Character 0
            switch(code[0]) {
                case '2': result += 5; break;
                case '3': result += 9; break;
                case '6': result += 8; break;
                default: 
                    errorMsg.style.display = 'block';
                    return;
            }

            result++;
            result *= 100;
            result += 10;

            // Character 1
            switch(code[1]) {
                case 'k': result += 6; break;
                case 'l': result += 2; break;
                case 'q': result += 4; break;
                default: 
                    errorMsg.style.display = 'block';
                    return;
            }

            // Character 2
            switch(code[2]) {
                case 'w': result += 3; break;
                case 'c': result += 6; break;
                case 'v': result += 2; break;
                default: 
                    errorMsg.style.display = 'block';
                    return;
            }

            // Character 3
            switch(code[3]) {
                case '7': 
                    result = Math.floor(result / 2); // Simulating C integer division
                    break;
                case 'b': result *= 3; break;
                case '1': result += 256; break;
                case '6': result += 133; break;
                case 'z': result += 0; break;
                default: 
                    errorMsg.style.display = 'block';
                    return;
            }

            // Transition to success screen
            errorMsg.style.display = 'none';
            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            document.getElementById('result-output').innerText = result;
        }
    </script>

</body>
</html>
